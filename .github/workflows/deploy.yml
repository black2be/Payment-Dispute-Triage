name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Payment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: 52.19.75.103
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/payment-triage
            sudo chown ubuntu:ubuntu /opt/payment-triage
            cd /opt/payment-triage
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/black2be/Payment-Dispute-Triage.git .
            fi
            docker stop payment-triage 2>/dev/null || true
            docker rm payment-triage 2>/dev/null || true
            docker compose down || true
            docker compose up -d --build
