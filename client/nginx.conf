# Serve the React SPA. Caddy handles TLS and routes /api/* to the API,
# so this server only ever serves static files + the SPA fallback.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
